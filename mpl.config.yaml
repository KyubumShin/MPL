# =============================================================================
# MPL Configuration — v2 SSOT (Single Source of Truth)
# =============================================================================
#
# This file is the v2 single-source-of-truth for MPL configuration.
# Read by `hooks/lib/config.mjs` (v2 loader).
#
# COEXISTENCE WITH LEGACY:
#   - Legacy `hooks/lib/mpl-config.mjs` is still active and read by every
#     existing hook. It loads `.mpl/config.json` and uses its own DEFAULTS.
#   - This YAML is ADDITIVE — it does NOT replace the legacy loader.
#   - Every key in the legacy DEFAULTS appears here with the IDENTICAL
#     default value (true superset). Doc-only knobs from
#     `docs/config-schema.md` (tool_mode, context_rotation, mcp_server,
#     context_monitor, phase_seed, chain_seed, discovery) are also
#     included so an eventual single-file migration is lossless.
#   - v2-only sections (`channels`, `contracts`, `evidence`, `gates`,
#     `permit`, `schemas`, `audit`) are present as empty-but-shaped
#     containers so future policy modules can register against a known
#     structure without further schema work.
#
# RESOLUTION ORDER (when v2 loader is wired into hooks — NOT YET):
#   workspace `<cwd>/mpl.config.yaml`  >  repo-root `mpl.config.yaml`
#
# Legacy-compat markers — `lib/config.mjs` uses these to detect
# missing sections and fill from the legacy DEFAULTS at runtime.
# =============================================================================

version: 2
legacy_json_compat: true

# -----------------------------------------------------------------------------
# Core Settings (legacy DEFAULTS — mirrors mpl-config.mjs)
# -----------------------------------------------------------------------------
max_fix_loops: 10
gate1_strategy: auto           # auto | docker | native | skip
hitl_timeout_seconds: 30

# Doc-only knob (not in legacy DEFAULTS; legacy loader passes through
# unchanged when present in .mpl/config.json). See docs/config-schema.md.
tool_mode: standalone          # standalone | full | partial

# -----------------------------------------------------------------------------
# Context & Memory
# -----------------------------------------------------------------------------
context_cleanup_window: 3

# Doc-only knob — terminal backend for session rotation. Auto-detect when
# omitted; explicit value pins the backend.
context_rotation:
  backend: null                # kitty | tmux | osascript | null=auto

# -----------------------------------------------------------------------------
# Phase Parallelism
# -----------------------------------------------------------------------------
parallelism:
  max_phase_workers: 2         # clamped to 1..3 at load time

# -----------------------------------------------------------------------------
# Convergence Detection
# -----------------------------------------------------------------------------
convergence:
  stagnation_window: 3
  min_improvement: 0.05
  regression_threshold: -0.1

# -----------------------------------------------------------------------------
# Phase Seed (D-01, v0.6.0) — doc-only knobs
# -----------------------------------------------------------------------------
phase_seed:
  enabled: true

# -----------------------------------------------------------------------------
# Chain-Scoped Seed (#34, Stage 1) — doc-only knobs
# -----------------------------------------------------------------------------
chain_seed:
  enabled: false
  max_chain_size: 5
  discovery_regen_enabled: true

# -----------------------------------------------------------------------------
# Context Monitor (#34, Stage 1) — doc-only knobs
# -----------------------------------------------------------------------------
context_monitor:
  enabled: true
  mode: measure                # measure | enforce
  context_window_tokens: 1000000
  baton_threshold_pct: 60
  force_threshold_pct: 80
  dispatch_warn: 30

# -----------------------------------------------------------------------------
# Test Wait Policy (#34, Stage 2)
# -----------------------------------------------------------------------------
test_wait:
  cache_mode: default          # default | extended
  threshold_default_sec: 270
  threshold_extended_sec: 3300
  pipelining_enabled: true

# -----------------------------------------------------------------------------
# Discovery Pipeline (#34, Stage 2) — doc-only knobs
# -----------------------------------------------------------------------------
discovery:
  scanner_enabled: true
  agent_enabled: false
  false_positive_threshold_pct: 30

# -----------------------------------------------------------------------------
# Ambiguity Gate (#240)
# -----------------------------------------------------------------------------
ambiguity:
  threshold: 0.2
  force_proceed_after_rounds: null

# -----------------------------------------------------------------------------
# Gate Classification (#240) — extends STRICT_GATE_HEAD_ALLOWLIST
# -----------------------------------------------------------------------------
gate_classify:
  allowed_heads: []

# -----------------------------------------------------------------------------
# Bash Timeout Categories (#240) — per-category ceiling overrides
# -----------------------------------------------------------------------------
# Shape (per-category override):
#   bash_timeout:
#     <category_name>:
#       max_ms: <int>
bash_timeout: {}

# -----------------------------------------------------------------------------
# Test Agent (AD-0007)
# -----------------------------------------------------------------------------
test_agent:
  default_required: true

# -----------------------------------------------------------------------------
# Required-flag booleans (legacy)
# -----------------------------------------------------------------------------
goal_contract_required: true
goal_trace_required: true
phase_contract_graph_required: true
decomposition_delta_required: true
phase_evidence_latch_required: true
completed_phase_immutability_required: true
whole_goal_closure_required: true
e2e_authenticity_required: true
finalize_artifacts_required: true
phase0_artifacts_required: true

# -----------------------------------------------------------------------------
# Enforcement (P0-2, #110) — strict toggle + per-rule policy
# Values: warn | block | off
# Precedence (legacy): state.json > .mpl/config.json > DEFAULTS
# -----------------------------------------------------------------------------
enforcement:
  strict: false
  # v0.18.1+ — direct_source_edit now defaults to BLOCK on the Bash tool surface
  # too (per Move #6 closing Law 2 gap). Workspaces that still want the
  # transitional warn behavior must explicitly set `direct_source_edit: warn`
  # in their .mpl/config.json or state.json `enforcement` override.
  direct_source_edit: block
  # bash_write_targets: gate for the Move #6 Bash-tool extension. When 'off'
  # the Bash-target extraction is skipped entirely (fall through to dangerous-
  # bash warn). When 'warn' or 'block', falls back to direct_source_edit for
  # the actual enforcement action — bash_write_targets is the GATE,
  # direct_source_edit is the ACTION.
  bash_write_targets: block
  phase_scope_violation: warn
  missing_gate_evidence: warn
  missing_artifact_schema: warn
  anti_pattern_match: warn
  state_invariant_violation: warn
  bash_timeout_violation: warn
  audit_residual: warn
  # Default 'block' rules (#235 B-category — state-corruption guards).
  missing_phase_evidence: block
  missing_finalize_artifacts: block
  missing_completed_phase_immutability: block
  missing_decomposition_delta: block
  missing_chain_assignment: block
  missing_e2e_evidence: block
  e2e_authenticity_invalid: block
  missing_whole_goal_closure: block
  finalize_gate_failures: block        # #257 coalesced finalize gate
  pp_schema_invalid: block
  small_plan_scope_conflict: block
  fast_track_phase0_artifacts_missing: block
  # Audit-trail entries: {rule, value, reason, timestamp, source}
  overrides: []

# Top-level overrides[] (legacy DEFAULTS surface). Identical purpose to
# `enforcement.overrides` — kept for byte-level parity with the legacy JSON.
overrides: []

# =============================================================================
# v2-ONLY SECTIONS — empty-but-shaped policy registries
# =============================================================================
# These mirror the proposal §3 / §5 module taxonomy:
#   channels | contracts | evidence | gates | permit | schemas | audit
#
# Each is a registry hash keyed by rule-id. Empty today; future policy
# modules read from here. The v2 loader treats absence as "no rules
# registered" — never as an error.
# =============================================================================

channels:
  # SSOT for .mpl/ path allowlist. Anything under .mpl/ that matches NO
  # allowed.path glob AND NO forbidden_patterns entry is treated as
  # 'unregistered_channel' and blocked. Move #7 introduces this
  # registry; legacy flat arrays (immutable_paths / writable_paths)
  # remain present as empty lists so any reader that addresses them
  # directly still sees [], not undefined.
  allowed:
    - { path: '.mpl/state.json',                                writers: [engine, worker, mcp], category: state }
    - { path: '.mpl/config.json',                               writers: [user, engine],        category: config }
    - { path: '.mpl/config/**/*.json',                          writers: [user, engine],        category: config }
    - { path: '.mpl/goal-contract.yaml',                        writers: [interviewer],         category: contract, schema: goal_contract }
    - { path: '.mpl/pivot-points.md',                           writers: [interviewer],         category: contract, schema: pivot_points }
    - { path: '.mpl/requirements/user-contract.md',             writers: [interviewer],         category: contract, schema: user_contract }
    - { path: '.mpl/mpl/decomposition.yaml',                    writers: [planner],             category: decomposition, schema: decomposition }
    - { path: '.mpl/mpl/decomposition-derived.json',            writers: [planner],             category: decomposition }
    - { path: '.mpl/mpl/decomposition-delta.yaml',              writers: [planner],             category: decomposition }
    - { path: '.mpl/mpl/decomposition-deltas/recompose-*.yaml', writers: [planner],             category: decomposition }
    - { path: '.mpl/mpl/baseline.yaml',                         writers: [interviewer],         category: baseline }
    - { path: '.mpl/mpl/.baseline-renewal',                     writers: [orchestrator],        category: sentinel }
    - { path: '.mpl/mpl/phases/phase-*/state-summary.md',       writers: [executor],            category: phase, schema: state_summary }
    - { path: '.mpl/mpl/phases/phase-*/verification.md',        writers: [verifier],            category: phase, schema: verification }
    - { path: '.mpl/mpl/phases/phase-*/phase-seed.yaml',        writers: [planner],             category: phase }
    - { path: '.mpl/mpl/phases/phase-*/changes.diff',           writers: [executor],            category: phase }
    - { path: '.mpl/mpl/phases/phase-*/warnings.json',          writers: [executor, verifier],  category: phase }
    - { path: '.mpl/mpl/phases/phase-*/reflections/attempt-*.md', writers: [executor],          category: phase }
    - { path: '.mpl/contracts/*.json',                          writers: [planner],             category: contract }
    - { path: '.mpl/mpl/phase0/**',                             writers: [analyzer],            category: phase0 }
    - { path: '.mpl/mpl/chains/chain-*/chain-seed.yaml',        writers: [planner],             category: chain }
    - { path: '.mpl/mpl/profile/**',                            writers: [engine],              category: profile, append_only: true }
    - { path: '.mpl/signals/**',                                writers: [engine, hooks],       category: signals, append_only: true }
    - { path: '.mpl/memory/{semantic,episodic,learnings,working}.md', writers: [engine],        category: memory }
    - { path: '.mpl/memory/{procedural,routing-patterns}.jsonl', writers: [engine],             category: memory, append_only: true }
    - { path: '.mpl/cache/**',                                  writers: [engine],              category: cache }
    - { path: '.mpl/archive/**',                                writers: [engine],              category: archive }
    - { path: '.mpl/research/**',                               writers: [research],            category: research }
    - { path: '.mpl/e2e-traces/**',                             writers: [executor],            category: traces }
    - { path: '.mpl/mpl/checkpoints/**',                        writers: [engine],              category: checkpoint }
    - { path: '.mpl/mpl/releases/**',                           writers: [engine],              category: release }
    # marginal-but-grandfathered top-level sentinels (current code writes these)
    - { path: '.mpl/PLAN.md',                                   writers: [engine],              category: plan }
    - { path: '.mpl/discoveries.md',                            writers: [engine],              category: discoveries, append_only: true }
    - { path: '.mpl/auto-permit-learned.json',                  writers: [hooks],               category: permit }
    - { path: '.mpl/context-usage.json',                        writers: [hooks],               category: hud }

  immutable_when:
    - { match: '.mpl/mpl/baseline.yaml',               when: 'baseline_renewal_sentinel_absent' }
    - { match: '.mpl/mpl/phases/phase-*/**',           when: 'phase_lifecycle.phase_id_completed', applies_to: phase_id }
    - { match: '.mpl/mpl/decomposition.yaml',          when: 'completed_phase_block_unchanged' }
    - { match: '.mpl/pivot-points.md',                 when: 'always_after_first_write' }
    - { match: '.mpl/contracts/*.json',                when: 'phase_lifecycle.phase_id_completed', applies_to: contract_phase_id }

  forbidden_patterns:
    - '.mpl/scratchpad*'
    - '.mpl/scratch/**'
    - '.mpl/notes/**'
    - '.mpl/notes.md'
    - '.mpl/tmp/**'
    - '.mpl/temp/**'
    - '.mpl/draft/**'
    - '.mpl/idea/**'
    - '.mpl/jot/**'
    - '.mpl/pivot-points-backup.md'    # duplicate-of-SSOT
    - '.mpl/working.md'                # duplicate of .mpl/memory/working.md
    - '.mpl/runbook.md'                # duplicate of .mpl/mpl/RUNBOOK.md
    - '.mpl/mml/**'                    # historical typo cleanup AD-0006

  # Back-compat: legacy flat arrays kept available so any existing reader
  # that addresses channels.immutable_paths / writable_paths directly
  # still sees [], not undefined.
  immutable_paths: []
  writable_paths: []

contracts:
  # Phase contract declarative rules (extended in Move #8 to cover all 13 require-* surfaces).
  chain_assignment:
    required: true
  coverage:
    required: true
  decomposition:
    require_delta: true
  goal_trace:
    required: true
  test_agent:
    brief_required: true
    pass_required: true                # gate state.test_agent_dispatched verdict
  reviewer:
    required: true
  e2e:
    required: true
  e2e_authenticity:
    required: true
  finalize_artifacts:
    required: true
  whole_goal_closure:
    required: true
  phase_contract_graph:
    required: true
  phase_evidence:
    required: true                     # canonical Evidence Latch gate (now structural)
  completed_phase_immutability:
    required: true

evidence:
  # Structural evidence-check rules. Replaces legacy substring+'pass' Evidence Latch.
  # Each rule names a token from decomposition.yaml phase.evidence_required[].
  # structural_check: true means policy/evidence.mjs runs the per-token
  # structural verification (state-join + artifact-existence + schema parse).
  # fallback_allowed: false means substring 'pass' in verification.md is INSUFFICIENT.
  allow_legacy_text_fallback: false    # transition-window opt-out (set true only via state.json override)
  unknown_token_action: block          # closes the open-schema hole — decomposer cannot invent tokens
  rules:
    - token: command
      structural_check: true
      fallback_allowed: false
      state_path: gate_results
    - token: test_agent
      structural_check: true
      fallback_allowed: false
      state_path: test_agent_dispatched
    - token: test_agent_brief
      structural_check: true
      fallback_allowed: false
      artifact_paths: ['.mpl/mpl/phases/{phase_id}/test-agent-brief.yaml']
    - token: goal_trace
      structural_check: true
      fallback_allowed: false
      artifact_paths: ['.mpl/mpl/decomposition.yaml', '.mpl/goal-contract.yaml']
    - token: api_contract
      structural_check: true
      fallback_allowed: false
      artifact_paths: ['.mpl/contracts/*.json', '.mpl/contracts/*.yaml']
    - token: type_policy
      structural_check: true
      fallback_allowed: false
      state_path: gate_results.hard1
    - token: error_spec
      structural_check: true
      fallback_allowed: false
    - token: tests_pass
      structural_check: true
      fallback_allowed: false
      artifact_paths: ['.mpl/mpl/phases/{phase_id}/junit*.xml']
      state_path: test_agent_dispatched
    - token: security
      structural_check: true
      fallback_allowed: false
      state_path: security_results
      artifact_paths: ['.mpl/security-report.json']
    - token: e2e
      structural_check: true
      fallback_allowed: false
      state_path: e2e_results
      artifact_paths: ['.mpl/mpl/e2e-scenarios.yaml']
    - token: e2e_authenticity
      structural_check: true
      fallback_allowed: false
      artifact_paths: ['.mpl/mpl/e2e-scenarios.yaml']
    - token: file_exists
      structural_check: true
      fallback_allowed: false
    - token: export_manifest
      structural_check: true
      fallback_allowed: false
      artifact_paths: ['.mpl/mpl/releases/{cut_id}/release-manifest.json']
    - token: lsp_diagnostics
      structural_check: true
      fallback_allowed: false
      state_path: gate_results.hard1
      artifact_paths: ['.mpl/mpl/phases/{phase_id}/lsp-diagnostics.json']
    - token: lint
      structural_check: true
      fallback_allowed: false
      state_path: gate_results.hard1
    - token: type_check
      structural_check: true
      fallback_allowed: false
      state_path: gate_results.hard1
    - token: build
      structural_check: true
      fallback_allowed: false
      state_path: gate_results.hard1
    - token: documentation
      structural_check: true
      fallback_allowed: true               # docs are textual; allow text fallback for now
    - token: manual
      structural_check: true
      fallback_allowed: false
      state_path: gate_results.manual_attestation
    - token: external_audit
      structural_check: true
      fallback_allowed: false
      artifact_paths: ['.mpl/mpl/phases/{phase_id}/external-audit.json']
    - token: tooling
      structural_check: true
      fallback_allowed: false
      state_path: gate_results.tooling

gates:
  # Finalize / quality / ambiguity / phase-transition gate rules.
  # Owned by hooks/lib/policy/gates.mjs (Move #9 L2 SSOT). Each entry maps to
  # one of the four `handle(event, ctx)` sub-handlers exposed by gates.mjs.
  finalize:
    enabled: true
  quality:
    threshold: 0.7
    max_retries: 3
  ambiguity:
    enabled: true
  phase_transition:
    # Pass-A: simple phase cases (mpl-init, mpl-decompose,
    # mpl-ambiguity-resolve, phase1-plan, phase1a-research, phase1b-plan,
    # phase4-fix, phase5-finalize) + G4 hang short-circuit + blocked_hook
    # routing are owned by gates.mjs::handlePhaseTransition. Heavy cases
    # (phase2-sprint cohort lazy-init, release-gate, release-finalize,
    # phase3-gate, small-*) stay in the wrapper for now and migrate to
    # `lib/release/` in Pass-B (a follow-up Move).
    enabled: true

permit:
  # Auto-permit + bash-timeout + resource-risk rules.
  auto_permit:
    fail_closed: true
  bash_timeout:
    categories: {}
  resource_risk:
    rules: []

schemas:
  # validate-* + property-check rules.
  rules: []

audit:
  # Finalize-time global audit (Tier 4 + drift). Empty registry today.
  rules: []
